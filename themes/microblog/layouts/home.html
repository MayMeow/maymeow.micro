{{ define "main" }}
  {{ .Content }}
  {{ range .Paginator.Pages }}
    <section>
      <div>
        <a href="{{ .RelPermalink }}">{{ .Date }}</a>
      </div>
      <div>
        {{ $plainContentWithEmoji := (print .Params.emoji " " .Plain) }}
        {{ $plainContentWithEmoji | markdownify | emojify }}
      </div>
    </section>
  {{ end }}

  {{ partial "pagination.html" . }}
{{ end }}
